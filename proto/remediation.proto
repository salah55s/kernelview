syntax = "proto3";

package kernelview.remediation.v1;

option go_package = "github.com/kernelview/kernelview/pkg/pb/remediationpb";

import "google/protobuf/timestamp.proto";

// RemediationRequest is sent from the Correlator to the Operator.
message RemediationRequest {
  string request_id = 1;
  string correlation_id = 2;
  google.protobuf.Timestamp requested_at = 3;

  // What triggered this
  string trigger = 4;  // "NOISY_NEIGHBOR", "OOM_KILL", "LATENCY_SPIKE", etc.

  // Target
  string target_pod = 10;
  string target_namespace = 11;
  string target_deployment = 12;

  // Action
  ActionType action = 20;
  ActionParameters parameters = 21;

  // Whether human approval is required (from license tier config)
  bool approval_required = 30;
}

enum ActionType {
  ACTION_TYPE_UNSPECIFIED = 0;
  THROTTLE_CPU = 1;
  RESTART_POD = 2;
  ISOLATE_POD = 3;
  ADJUST_MEMORY = 4;
  SCALE_DOWN = 5;
}

message ActionParameters {
  // For THROTTLE_CPU
  int32 new_cpu_limit_millicores = 1;

  // For ADJUST_MEMORY
  int64 new_memory_limit_bytes = 2;

  // For SCALE_DOWN
  int32 new_replica_count = 3;

  // Common
  int32 duration_seconds = 10;  // Auto-revert after this duration (0 = permanent)
  bool dry_run = 11;            // Log the action but don't execute
}

// RemediationStatus is the response / status update.
message RemediationStatus {
  string request_id = 1;
  Phase phase = 2;
  google.protobuf.Timestamp executed_at = 3;
  google.protobuf.Timestamp reverted_at = 4;
  string message = 5;
  string error = 6;

  // Safety check results
  repeated SafetyCheckResult safety_checks = 10;
}

enum Phase {
  PHASE_UNSPECIFIED = 0;
  PENDING = 1;
  APPROVED = 2;
  EXECUTING = 3;
  COMPLETED = 4;
  REVERTED = 5;
  FAILED = 6;
  REJECTED = 7;  // Failed safety check
}

message SafetyCheckResult {
  string rule_name = 1;
  bool passed = 2;
  string reason = 3;
}

// RemediationService is the internal gRPC service for the Operator.
service RemediationService {
  rpc RequestRemediation(RemediationRequest) returns (RemediationStatus);
  rpc GetStatus(GetRemediationStatusRequest) returns (RemediationStatus);
  rpc ApproveRemediation(ApproveRemediationRequest) returns (RemediationStatus);
}

message GetRemediationStatusRequest {
  string request_id = 1;
}

message ApproveRemediationRequest {
  string request_id = 1;
  string approved_by = 2;
}
