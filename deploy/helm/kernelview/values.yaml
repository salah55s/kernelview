# KernelView Helm Values
# Full reference: docs/helm-values.md

# ============================================================
# Global
# ============================================================
global:
  image:
    registry: ghcr.io/kernelview
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  # imagePullSecrets: []

# ============================================================
# eBPF Agent (DaemonSet)
# ============================================================
agent:
  enabled: true
  image:
    repository: kernelview-agent
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 200Mi  # PRD: <200MB RSS
  # Node selector: Linux only (PRD: skip Windows)
  nodeSelector:
    kubernetes.io/os: linux
  tolerations:
    - effect: NoSchedule
      operator: Exists
  # Security: specific capabilities, NOT privileged (PRD §10.1)
  securityContext:
    privileged: false
    capabilities:
      add:
        - BPF
        - NET_ADMIN
        - SYS_RESOURCE
        - PERFMON
      drop:
        - ALL
  env:
    COLLECTOR_ENDPOINT: "kernelview-collector:4317"
    BPF_PIN_PATH: "/sys/fs/bpf/kernelview/"
    RING_BUFFER_SIZE: "67108864"  # 64MB
  volumes:
    - name: bpf-fs
      hostPath:
        path: /sys/fs/bpf
    - name: cgroup-fs
      hostPath:
        path: /sys/fs/cgroup
    - name: proc
      hostPath:
        path: /proc
  volumeMounts:
    - name: bpf-fs
      mountPath: /sys/fs/bpf
    - name: cgroup-fs
      mountPath: /sys/fs/cgroup
    - name: proc
      mountPath: /host/proc
      readOnly: true

# ============================================================
# Collector (Deployment)
# ============================================================
collector:
  enabled: true
  image:
    repository: kernelview-collector
  replicas: 3  # PRD: 3 replicas for availability
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 1Gi
  service:
    grpc:
      port: 4317
    rest:
      port: 8080
  env:
    GRPC_LISTEN_ADDR: ":4317"
    REST_LISTEN_ADDR: ":8080"
    VM_REMOTE_WRITE_URL: "http://kernelview-victoriametrics:8428/api/v1/write"
    BADGER_DATA_DIR: "/data/badger"
  persistence:
    enabled: true
    size: 50Gi
    storageClass: ""  # Use default

# ============================================================
# AI Correlator (Enterprise — Deployment)
# ============================================================
correlator:
  enabled: false  # Enterprise feature — disabled by default
  image:
    repository: kernelview-correlator
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    LLM_PROVIDER: "claude"
    LLM_MODEL: "claude-3-sonnet-20240229"
    # LLM_API_KEY: set via secret
    # LLM_ENDPOINT: for Ollama
  secrets:
    llmApiKey: ""  # Set during install

# ============================================================
# Remediation Operator (Enterprise — Deployment)
# ============================================================
operator:
  enabled: false  # Enterprise feature — disabled by default
  image:
    repository: kernelview-operator
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  env:
    DRY_RUN: "false"
  # RBAC created from rbac.yaml template

# ============================================================
# Dashboard (Deployment)
# ============================================================
dashboard:
  enabled: true
  image:
    repository: kernelview-dashboard
  replicas: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 256Mi
  service:
    port: 8080
  ingress:
    enabled: false
    className: ""
    hosts: []
    tls: []

# ============================================================
# VictoriaMetrics (StatefulSet)
# ============================================================
victoriametrics:
  enabled: true
  image:
    repository: victoriametrics/victoria-metrics
    tag: v1.99.0
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "1"
      memory: 2Gi
  retention: 30d
  persistence:
    size: 100Gi
    storageClass: ""

# ============================================================
# TLS / cert-manager
# ============================================================
tls:
  enabled: false
  certManager:
    enabled: false
    issuer: ""
